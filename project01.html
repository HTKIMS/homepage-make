<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>프로젝트 01 - 작은숲건축사사무소</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, "Noto Sans KR", sans-serif;
      color: #222;
      background: #f6f5f2;
      line-height: 1.7;
    }

    header {
      padding: 80px 24px 60px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 36px;
      font-weight: 500;
    }

    header p {
      margin-top: 12px;
      color: #666;
    }

    .back {
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px;
    }

    .back a {
      color: #222;
      text-decoration: none;
      border-bottom: 1px solid #222;
    }

    main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px 24px 80px;
    }

    .info {
      margin-bottom: 40px;
      color: #444;
      font-size: 17px;
    }

    .info p {
      margin: 8px 0;
    }

    .gallery {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    .image-placeholder {
      height: 520px;
      background: #ddd8cf;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #777;
      font-size: 15px;
    }

    footer {
      text-align: center;
      padding: 28px;
      color: #777;
      font-size: 14px;
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 28px;
      }

      .image-placeholder {
        height: 280px;
      }
    }
  </style>
</head>

<body>
  <div class="back">
    <a href="index.html">← 프로젝트 목록으로 돌아가기</a>
  </div>

  <header>
    <h1>프로젝트 01</h1>
    <p>완료 프로젝트</p>
  </header>

  <main>
    <div class="info">
      <p>위치: 입력 예정</p>
      <p>용도: 단독주택</p>
      <p>연도: 입력 예정</p>
      <p>
        프로젝트 설명을 입력하세요. 대지의 조건, 건축주의 생활 방식,
        공간 구성의 방향 등을 2~3줄 정도로 정리하면 좋습니다.
      </p>
    </div>

    <div class="gallery">
      <div class="image-placeholder">Project 01 Image 01</div>
      <div class="image-placeholder">Project 01 Image 02</div>
      <div class="image-placeholder">Project 01 Image 03</div>
      <div class="image-placeholder">Project 01 Image 04</div>
      <div class="image-placeholder">Project 01 Image 05</div>
    </div>
  </main>

  <footer>
    © 작은숲건축사사무소. All rights reserved.
  </footer>
</body>
</html>
